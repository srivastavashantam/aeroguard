# ============================================================
# AeroGuard — Central Configuration File
# Saari project settings yahan se control hoti hain
# Code mein koi bhi value hardcode nahi karni — yahan se leni hai
# ============================================================

project:
  name: aeroguard
  version: "1.0.0"
  environment: development        # development ya production

paths:
  data_dir: ./data                # raw dataset yahan hoga
  artifacts_dir: ./artifacts      # trained models yahan save honge
  logs_dir: ./logs                # log files yahan jaayengi
  mlruns_dir: ./mlruns            # MLflow runs yahan store honge

data:
  # Poora raw dataset — 28,935 flights
  raw_flight_data: ./data/all_flights/one_parq
  flight_header_full: ./data/all_flights/flight_header.csv

  # Benchmark subset — 2 din wali flights, model training ke liye
  flight_header_2days: ./data/2days/flight_header.csv
  flight_data_2days: ./data/2days/flight_data.pkl
  stats_2days: ./data/2days/stats.csv

  min_flight_duration: 1800
  truncate_timesteps: 4096
  n_channels: 30
  train_split: 0.70
  val_split: 0.20
  test_split: 0.10
  batch_size: 500
  prepared_dataset_dir: ./data/prepared_datasets/dl_dataset

  # Flight filtering
  min_flight_duration: 1800
  truncate_timesteps: 4096

model:
  # RUL = Remaining Useful Life
  # Agar flight maintenance se 2 din pehle hai → label = 1 (needs maintenance)
  rul_threshold: 2                # days

  # Alert severity thresholds — probability ke basis pe
  alert_critical: 0.80            # 80%+ → CRITICAL — turant ground karo
  alert_high: 0.60                # 60-79% → HIGH — agli flight se pehle inspect
  alert_medium: 0.40              # 40-59% → MEDIUM — monitor karo

logging:
  level: DEBUG                    # DEBUG = sab kuch log hoga (development)
                                  # INFO = sirf important events (production)
  rotation: "10 MB"               # file 10MB hone pe nayi file banega
  retention: "30 days"            # 30 din purani files automatically delete